name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install g++
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Compile
        run: g++ -Iinclude src/twosum.cpp tests/test_twosum.cpp -o test
        
      - name: Run tests
        run: ./test